server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexhire
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: nexhire-secret-key-change-in-production-minimum-256-bits-long-key
    expiration-ms: 86400000
