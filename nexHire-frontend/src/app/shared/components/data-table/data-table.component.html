<div class="data-table-container">
  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Table Content -->
  <div class="table-wrapper" [class.loading]="loading">
    <!-- Empty State -->
    <app-empty-state
      *ngIf="isEmpty && !loading"
      icon="inbox"
      [title]="emptyMessage">
    </app-empty-state>

    <!-- Data Table -->
    <table
      *ngIf="!isEmpty || loading"
      mat-table
      [dataSource]="dataSource"
      matSort
      (matSortChange)="onSortChange($event)"
      class="data-table">

      <!-- Checkbox Column -->
      <ng-container matColumnDef="select" *ngIf="selectable">
        <th mat-header-cell *matHeaderCellDef class="checkbox-column">
          <mat-checkbox
            (change)="$event ? toggleAllRows() : null"
            [checked]="selection.hasValue() && isAllSelected()"
            [indeterminate]="selection.hasValue() && !isAllSelected()"
            [aria-label]="checkboxLabel()">
          </mat-checkbox>
        </th>
        <td mat-cell *matCellDef="let row" class="checkbox-column">
          <mat-checkbox
            (click)="$event.stopPropagation()"
            (change)="$event ? toggleRow(row) : null"
            [checked]="isSelected(row)"
            [aria-label]="checkboxLabel(row)">
          </mat-checkbox>
        </td>
      </ng-container>

      <!-- Dynamic Columns -->
      <ng-container *ngFor="let column of columns; trackBy: trackByColumn" [matColumnDef]="column.field">
        <th
          mat-header-cell
          *matHeaderCellDef
          [mat-sort-header]="column.sortable !== false ? column.field : ''"
          [disabled]="column.sortable === false"
          [style.width]="column.width">

          <!-- Column Label -->
          <div class="column-header">
            <span class="column-label">{{ column.label }}</span>

            <!-- Filter Input -->
            <div class="column-filter" *ngIf="column.filterable">
              <mat-form-field class="filter-field" appearance="outline" subscriptSizing="dynamic">
                <input
                  matInput
                  [placeholder]="'Filter ' + column.label"
                  (input)="onFilterInput(column.field, $any($event.target).value)"
                  (click)="$event.stopPropagation()">
                <mat-icon matPrefix class="filter-icon">filter_list</mat-icon>
              </mat-form-field>
            </div>
          </div>
        </th>

        <td
          mat-cell
          *matCellDef="let row"
          [style.width]="column.width">
          <!-- Custom Template -->
          <ng-container *ngIf="column.cellTemplate; else defaultCell">
            <ng-container *ngTemplateOutlet="column.cellTemplate; context: { $implicit: row, value: getColumnValue(row, column) }"></ng-container>
          </ng-container>

          <!-- Default Cell -->
          <ng-template #defaultCell>
            {{ getColumnValue(row, column) }}
          </ng-template>
        </td>
      </ng-container>

      <!-- Table Rows -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;"
        [class.selected]="isSelected(row)">
      </tr>
    </table>
  </div>

  <!-- Paginator -->
  <mat-paginator
    *ngIf="showPagination && !isEmpty"
    [length]="totalRecords"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    (page)="onPageSizeChange($event)"
    showFirstLastButtons
    aria-label="Select page">
  </mat-paginator>
</div>
